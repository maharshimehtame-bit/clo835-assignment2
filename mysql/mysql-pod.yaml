apiVersion: v1
kind: Pod
metadata:
  name: mysql-pod
  namespace: mysql
  labels:
    app: mysql
spec:
  containers:
    - name: mysql
      image: mysql:8.0
      args:
        - --default-authentication-plugin=mysql_native_password
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: password
        - name: MYSQL_DATABASE
          value: employees
      ports:
        - containerPort: 3306
      volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
      startupProbe:
        tcpSocket:
          port: 3306
        failureThreshold: 30
        periodSeconds: 5
      readinessProbe:
        tcpSocket:
          port: 3306
        initialDelaySeconds: 20
        periodSeconds: 5
  volumes:
    - name: mysql-data
      emptyDir: {}
